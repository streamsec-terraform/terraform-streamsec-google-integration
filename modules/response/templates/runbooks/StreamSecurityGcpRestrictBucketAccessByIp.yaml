main:
  params: [input]
  steps:
    # Adds an IP-based IAM condition to a specific binding on a GCS bucket,
    # identified by Member + Role from the violating gcp_iam_policy_binding.
    # If the binding already has a condition, the IP restriction is appended
    # with && so existing conditions are preserved.
    # Single IPs use: origin.ip == 'x.x.x.x'
    # CIDRs use: 'x.x.x.x/n'.inIpRange(origin.ip)
    # Multiple entries are joined with || so any trusted IP grants access.
    - parseInputs:
        assign:
          - bucket_id: ${input.BucketId}
          - member: ${input.Member}
          - role: ${input.Role}
          - allowed_ips: ${input.AllowedIps}

    - logInput:
        call: sys.log
        args:
          text: ${"Runbook started. BucketId='" + bucket_id + "', Member='" + member + "', Role='" + role + "', AllowedIps=" + json.encode_to_string(allowed_ips)}
          severity: INFO

    - validateIps:
        switch:
          - condition: ${len(allowed_ips) == 0}
            raise:
              status_code: "error"
              message: "AllowedIps must contain at least one IP address or CIDR range."

    - extractBucketName:
        assign:
          - ip_clauses: []

    # Build a CEL expression from the IP list.
    # CIDR entries (contain '/') use inIpRange(); plain IPs use equality.
    - buildConditionLoop:
        for:
          value: ip
          in: ${allowed_ips}
          steps:
            - checkCidr:
                switch:
                  - condition: ${text.find_all(ip, "/") != []}
                    steps:
                      - addCidrClause:
                          assign:
                            - ip_clauses: ${list.concat(ip_clauses, "'" + ip + "'.inIpRange(origin.ip)")}
                  - condition: true
                    steps:
                      - addIpClause:
                          assign:
                            - ip_clauses: ${list.concat(ip_clauses, "origin.ip == '" + ip + "'")}

    - joinExpression:
        assign:
          - ip_expression: ${text.join(ip_clauses, " || ")}

    # Policy version 3 is required to read and write IAM conditions.
    - getPolicy:
        try:
          call: googleapis.storage.v1.buckets.getIamPolicy
          args:
            bucket: ${bucket_id}
            optionsRequestedPolicyVersion: 3
          result: policy
        except:
          as: er
          raise:
            status_code: "error"
            message: ${"Failed to getIamPolicy: " + default(er.body.error.message, json.encode_to_string(er))}

    - initBindings:
        assign:
          - newBindings: []
          - updated: false

    # Find the specific binding matching Member + Role and append the IP condition.
    # All other bindings are copied unchanged.
    - iterateBindings:
        for:
          value: binding
          in: ${default(policy.bindings, [])}
          steps:
            - checkBinding:
                switch:
                  - condition: ${binding.role == role and list.index_of(default(binding.members, []), member) >= 0}
                    steps:
                      - buildExpression:
                          assign:
                            - existing: ${default(map.get(default(binding.condition, {}), "expression", ""), "")}
                      - mergeExpression:
                          switch:
                            - condition: ${existing == ""}
                              assign:
                                - merged: ${ip_expression}
                            - condition: true
                              assign:
                                - merged: ${"(" + existing + ") && (" + ip_expression + ")"}
                      - applyCondition:
                          assign:
                            - newBinding:
                                role: ${binding.role}
                                members: ${binding.members}
                                condition:
                                  expression: ${merged}
                                  title: "stream-security-ip-restriction"
                                  description: "IP restriction applied by Stream Security"
                            - newBindings: ${list.concat(newBindings, newBinding)}
                            - updated: true
                  - condition: true
                    steps:
                      - keepBinding:
                          assign:
                            - newBindings: ${list.concat(newBindings, binding)}

    - checkUpdated:
        switch:
          - condition: ${not(updated)}
            return:
              status_code: "success"
              message: ${"Binding for member '" + member + "' with role '" + role + "' not found on bucket " + bucket_id + "; no changes made."}

    - setPolicy:
        try:
          call: googleapis.storage.v1.buckets.setIamPolicy
          args:
            bucket: ${bucket_id}
            body:
              version: 3
              bindings: ${newBindings}
              etag: ${policy.etag}
          result: updated_policy
        except:
          as: er
          raise:
            status_code: "error"
            message: ${"Failed to setIamPolicy: " + default(er.body.error.message, json.encode_to_string(er))}

    - done:
        return:
          status_code: "success"
          message: ${"Added IP restriction to binding '" + member + "' / '" + role + "' on bucket " + bucket_id + ". Allowed IPs: " + json.encode_to_string(allowed_ips)}