main:
  params: [input]
  steps:
    # AllowedPrincipals is a list of principal strings (with prefixes, e.g.
    # "user:oncall@example.com", "serviceAccount:ingest@p.iam.gserviceaccount.com").
    # Every binding whose members aren't entirely in this list gets stripped
    # to only the allowed ones; bindings that end up empty are dropped.
    # This is Stream's pragmatic equivalent of the Tines "add conditional
    # IP-based IAM restriction" node — it locks the bucket down without
    # requiring a pre-provisioned Access Context Manager level.
    - parseInputs:
        assign:
          - bucket_id: ${input.BucketId}
          - allowed: ${input.AllowedPrincipals}
          - parts: ${text.split(bucket_id, "/")}

    - logInput:
        call: sys.log
        args:
          text: ${"Runbook started. BucketId='" + bucket_id + "', AllowedPrincipals=" + json.encode_to_string(allowed)}
          severity: INFO

    - validateBucket:
        switch:
          - condition: ${len(parts) < 4}
            raise:
              status_code: "error"
              message: ${"Invalid BucketId format. Expected 'projects/_/buckets/<bucket_name>', got; " + bucket_id}

    - validateAllowed:
        switch:
          - condition: ${len(allowed) == 0}
            raise:
              status_code: "error"
              message: "AllowedPrincipals must contain at least one entry; an empty lockdown would orphan the bucket."

    - extractBucketName:
        assign:
          - bucket_name: ${parts[3]}

    - getPolicy:
        try:
          call: googleapis.storage.v1.buckets.getIamPolicy
          args:
            bucket: ${bucket_name}
          result: policy
        except:
          as: er
          raise:
            status_code: "error"
            message: ${"Failed to getIamPolicy " + er.body.error.message}

    - filterBindings:
        assign:
          - newBindings: []
          - droppedCount: 0

    - iterateBindings:
        try:
          for:
            value: binding
            in: ${policy.bindings}
            steps:
              - initMembers:
                  assign:
                    - members: []
              - loopMembers:
                  for:
                    value: m
                    in: ${binding.members}
                    steps:
                      - checkMember:
                          switch:
                            - condition: ${list.index_of(allowed, m) >= 0}
                              steps:
                                - keepMember:
                                    assign:
                                      - members: ${list.concat(members, m)}
                            - condition: true
                              steps:
                                - tallyDropped:
                                    assign:
                                      - droppedCount: ${droppedCount + 1}
              - checkKeep:
                  switch:
                    - condition: ${len(members) > 0}
                      steps:
                        - buildBinding:
                            assign:
                              - newBinding:
                                  role: ${binding.role}
                                  members: ${members}
                        - addBinding:
                            assign:
                              - newBindings: ${list.concat(newBindings, newBinding)}
        except:
          as: er
          raise:
            status_code: "error"
            message: ${"Failed to iterateBindings " + er.body.error.message}

    - setPolicy:
        try:
          call: googleapis.storage.v1.buckets.setIamPolicy
          args:
            bucket: ${bucket_name}
            body:
              bindings: ${newBindings}
          result: updated
        except:
          as: er
          raise:
            status_code: "error"
            message: ${"Failed to setIamPolicy " + er.body.error.message}

    - done:
        return:
          status_code: "success"
          message: ${"Bucket " + bucket_name + " locked down. Dropped " + string(droppedCount) + " non-allowlisted member reference(s). Remaining binding count; " + string(len(updated.bindings))}
