main:
  params: [input]
  steps:
    # Member and Role are taken from the violating gcp_iam_policy_binding.
    # Scope and ScopeId are derived from that same binding so the revocation
    # targets the correct level (organization, folder, or project).
    - parseInputs:
        assign:
          - member: ${input.Member}
          - role: ${input.Role}
          - scope: ${default(input.Scope, "project")}
          - scope_id: ${input.ScopeId}

    - logInput:
        call: sys.log
        args:
          text: ${"Runbook started. Scope='" + scope + "', ScopeId='" + scope_id + "', Role='" + role + "', Member='" + member + "'"}
          severity: INFO

    # Build the CRM resource path based on scope.
    - buildResource:
        switch:
          - condition: ${scope == "organization"}
            assign:
              - resource: ${"organizations/" + scope_id}
          - condition: ${scope == "folder"}
            assign:
              - resource: ${"folders/" + scope_id}
          - condition: ${scope == "project"}
            assign:
              - resource: ${"projects/" + scope_id}
          - condition: true
            raise:
              status_code: "error"
              message: ${"Unrecognized Scope. Expected 'organization', 'folder', or 'project'; got " + scope}

    - getPolicy:
        try:
          call: http.post
          args:
            url: ${"https://cloudresourcemanager.googleapis.com/v3/" + resource + ":getIamPolicy"}
            auth:
              type: OAuth2
            body:
              options:
                requestedPolicyVersion: 3
          result: policyResp
        except:
          as: er
          raise:
            status_code: "error"
            message: ${"Failed to getIamPolicy on " + resource + "; " + default(er.body.error.message, json.encode_to_string(er))}

    - checkPolicyStatus:
        switch:
          - condition: ${policyResp.code >= 400}
            raise:
              status_code: "error"
              message: ${"Failed to getIamPolicy on " + resource + "; HTTP " + string(policyResp.code)}

    - filterBindings:
        assign:
          - policy: ${policyResp.body}
          - newBindings: []
          - removed: false

    - iterateBindings:
        try:
          for:
            value: binding
            in: ${default(policy.bindings, [])}
            steps:
              - checkRole:
                  switch:
                    - condition: ${binding.role != role}
                      steps:
                        - keepOtherRole:
                            assign:
                              - newBindings: ${list.concat(newBindings, binding)}
                    - condition: true
                      steps:
                        - initMembers:
                            assign:
                              - members: []
                        - loopMembers:
                            for:
                              value: m
                              in: ${default(binding.members, [])}
                              steps:
                                - checkMember:
                                    switch:
                                      - condition: ${m != member}
                                        steps:
                                          - keepMember:
                                              assign:
                                                - members: ${list.concat(members, m)}
                                      - condition: true
                                        steps:
                                          - markRemoved:
                                              assign:
                                                - removed: true
                        - rebuildBinding:
                            assign:
                              - newBinding:
                                  role: ${binding.role}
                                  members: ${members}
                        - addBinding:
                            assign:
                              - newBindings: ${list.concat(newBindings, newBinding)}
        except:
          as: er
          raise:
            status_code: "error"
            message: ${"Failed to iterateBindings; " + default(er.body.error.message, json.encode_to_string(er))}

    - checkNoChange:
        switch:
          - condition: ${not(removed)}
            return:
              status_code: "success"
              message: ${"Member " + member + " was not found in role " + role + " on " + scope + " " + scope_id + "; nothing to revoke."}

    - setPolicy:
        try:
          call: http.post
          args:
            url: ${"https://cloudresourcemanager.googleapis.com/v3/" + resource + ":setIamPolicy"}
            auth:
              type: OAuth2
            body:
              policy:
                bindings: ${newBindings}
                etag: ${policy.etag}
          result: setResp
        except:
          as: er
          raise:
            status_code: "error"
            message: ${"Failed to setIamPolicy on " + resource + "; " + default(er.body.error.message, json.encode_to_string(er))}

    - checkSetStatus:
        switch:
          - condition: ${setResp.code >= 400}
            raise:
              status_code: "error"
              message: ${"Failed to setIamPolicy on " + resource + "; HTTP " + string(setResp.code)}

    - done:
        return:
          status_code: "success"
          message: ${"Removed " + member + " from role " + role + " on " + scope + " " + scope_id + "."}
